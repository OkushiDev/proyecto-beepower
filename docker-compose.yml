services:
  db:
    image: postgres:15-alpine
    container_name: beepower_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beepower_network

volumes:
  postgres_data:

networks:
  beepower_network:
    driver: bridge