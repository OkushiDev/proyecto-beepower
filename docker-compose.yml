services:
  db:
    image: postgres:15-alpine
    container_name: beepower_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - beepower_network

  backend:
    build: ./backend
    container_name: beepower_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

    command: ["uv", "run", "fastapi", "dev", "app/main.py", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - beepower_network

volumes:
  postgres_data:

networks:
  beepower_network:
    driver: bridge